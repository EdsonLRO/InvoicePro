
[functions.generate-recurring]
enabled = true
verify_jwt = false
import_map = "./functions/generate-recurring/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/generate-recurring/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/generate-recurring/*.html" ]

[functions.send-document-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-document-email/deno.json"
entrypoint = "./functions/send-document-email/index.ts"
