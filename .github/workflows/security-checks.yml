name: Security checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.2.15
          cache: true
          cache-hash: ${{ hashFiles('supabase/functions/**/deno.lock') }}

      - name: Run focused security harnesses
        run: |
          node tests/account-data-export-harness.cjs
          node tests/app-public-integration-harness.cjs
          node tests/brand-logo-harness.cjs
          node tests/auth-captcha-harness.cjs
          node tests/cloudflare-pages-readiness-harness.cjs
          node tests/core-lifecycle-harness.cjs
          node tests/customer-item-validation-harness.cjs
          node tests/dispute-lifecycle-visibility-harness.cjs
          node tests/email-status-accuracy-harness.cjs
          node tests/edge-dependency-pin-harness.cjs
          node tests/financial-action-audit-harness.cjs
          node tests/mfa-recovery-harness.cjs
          node tests/operational-health-harness.cjs
          node tests/pwa-update-harness.cjs
          node tests/preview-acceptance-readiness-harness.cjs
          node tests/refund-consequence-preview-harness.cjs
          node tests/recurring-calendar-reliability-harness.cjs
          node tests/scale-accessibility-safety-harness.cjs
          node tests/security-workflow-harness.cjs
          node tests/sensitive-reauth-captcha-harness.cjs
          node tests/session-expiry-harness.cjs
          node tests/stripe-payment-integrity-harness.cjs
          node tests/tenant-isolation-attribution-harness.cjs

      - name: Build and test public website
        working-directory: website
        run: npm test

      - name: Type-check Edge Functions with frozen locks
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r entry; do
            function_dir="$(dirname "$entry")"
            echo "::group::$(basename "$function_dir")"
            (
              cd "$function_dir"
              deno check --frozen --lock=deno.lock index.ts
            )
            echo "::endgroup::"
          done < <(find supabase/functions -mindepth 2 -maxdepth 2 -name index.ts -print | sort)
